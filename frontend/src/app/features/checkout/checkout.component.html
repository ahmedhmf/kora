<div class="container mx-auto px-4 py-12 bg-neutral-50 min-h-[60vh]">
    <div class="max-w-2xl mx-auto text-center">
        <h1 class="text-3xl font-bold uppercase mb-4">Checkout</h1>
        <p class="text-neutral-500 mb-8">This is a mock checkout flow. In a real application, this would integrate with
            a payment provider.</p>

        <div class="bg-white p-8 rounded-lg shadow-sm border border-neutral-200 mb-4 text-left">
            <h2 class="font-bold text-xl mb-4 border-b pb-2">1. Shipping Address</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="First Name" class="border p-2 rounded w-full">
                <input type="text" placeholder="Last Name" class="border p-2 rounded w-full">
                <input type="text" placeholder="Address" class="border p-2 rounded w-full col-span-2">
                <input type="text" placeholder="City" class="border p-2 rounded w-full">
                <input type="text" placeholder="Postal Code" class="border p-2 rounded w-full">
            </div>
        </div>

        <div
            class="bg-white p-8 rounded-lg shadow-sm border border-neutral-200 mb-4 text-left opacity-50 cursor-not-allowed">
            <h2 class="font-bold text-xl">2. Delivery Method</h2>
        </div>
        <div
            class="bg-white p-8 rounded-lg shadow-sm border border-neutral-200 mb-4 text-left opacity-50 cursor-not-allowed">
            <h2 class="font-bold text-xl">3. Payment</h2>
        </div>

        <button
            class="w-full bg-primary text-white font-bold uppercase py-4 rounded hover:bg-red-600 transition-colors">
            Procceed to Payment
        </button>
    </div>
</div>
