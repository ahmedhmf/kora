<!-- Main Header -->
<header class="fixed top-0 left-0 w-full z-50 transition-all duration-500" [class.bg-white]="isScrolled()"
    [class.bg-transparent]="!isScrolled()" [class.shadow-xl]="isScrolled()" [class.py-2]="isScrolled()"
    [class.py-4]="!isScrolled()">
    <div class="container mx-auto px-6 md:px-12 lg:px-20 flex items-center justify-between">
        <!-- Logo -->
        <a routerLink="/" class="flex-shrink-0">
            <app-logo width="56" height="56" [isWhite]="false"></app-logo>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden lg:flex items-center gap-10 absolute left-1/2 -translate-x-1/2">
            @for (cat of categories; track cat.name) {
            <a [routerLink]="cat.path" [queryParams]="cat.queryParams"
                class="text-[13px] font-black uppercase tracking-widest transition-all pb-1 border-b-2 text-primary"
                [class.border-transparent]="true" [class.hover:text-white]="!isScrolled()"
                [class.hover:opacity-100]="true">
                {{ cat.name }}
            </a>
            }
        </nav>

        <div class="flex items-center gap-4 md:gap-8">
            <button class="p-2 transition-colors rounded-full text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            </button>

            <!-- Bag (Cart) -->
            <button (click)="toggleCart()" class="p-2 transition-colors rounded-full relative text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                    <path d="M3 6h18" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                @if (cartCount() > 0) {
                <span
                    class="absolute top-1 right-1 w-4 h-4 bg-accent text-white text-[9px] flex items-center justify-center rounded-full font-black">
                    {{ cartCount() }}
                </span>
                }
            </button>

            <!-- Shop CTA (Consistently KORA Red) -->
            <a routerLink="/shop"
                class="hidden md:flex btn-pill px-8 py-3 text-[11px] font-black bg-accent text-white transition-all transform hover:scale-105 active:scale-95 border-2 border-transparent"
                [class.border-white/10]="!isScrolled()">
                Shop
            </a>

            <!-- Mobile Menu -->
            <button class="lg:hidden p-2 transition-colors rounded-full" [class.text-neutral-300]="!isScrolled()"
                [class.text-primary]="isScrolled()">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" x2="20" y1="12" y2="12" />
                    <line x1="4" x2="20" y1="6" y2="6" />
                    <line x1="4" x2="20" y1="18" y2="18" />
                </svg>
            </button>
        </div>
    </div>
</header>
