        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-2">Email</label>
                <input type="email" class="w-full border p-3 rounded bg-neutral-50" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Password</label>
                <input type="password" class="w-full border p-3 rounded bg-neutral-50" placeholder="********">
            </div>
            <button class="w-full bg-black text-white font-bold uppercase py-3 hover:bg-neutral-800 transition-colors">
                Sign In
            </button>
            <div class="text-center text-sm text-neutral-500 mt-4">
                <a href="#" class="underline">Forgot password?</a>
                <span class="mx-2">|</span>

            </div>
        </div>
    </div>
</div>
