<div class="container mx-auto px-6 md:px-10 py-12 md:py-20 flex flex-col md:flex-row gap-12">
    <!-- Sidebar Filters -->
    <aside class="w-full md:w-60 flex-shrink-0 hidden md:block">
        <div class="sticky top-28">
            <div class="mb-10">
                <h4 class="font-bold text-base mb-6 uppercase tracking-tighter">Categories</h4>
                <ul class="space-y-3">
                    <li>
                        <a routerLink="/shop" [queryParams]="{ category: null }" routerLinkActive="text-black font-bold"
                            [routerLinkActiveOptions]="{exact: true}"
                            class="text-base text-text-secondary hover:text-black transition-colors block">All
                            Products</a>
                    </li>
                    <li>
                        <a routerLink="/shop" [queryParams]="{ category: 'handball' }"
                            routerLinkActive="text-black font-bold"
                            class="text-base text-text-secondary hover:text-black transition-colors block">Handballs</a>
                    </li>
                    <li>
                        <a routerLink="/shop" [queryParams]="{ category: 'football' }"
                            routerLinkActive="text-black font-bold"
                            class="text-base text-text-secondary hover:text-black transition-colors block">Footballs</a>
                    </li>
                </ul>
            </div>

            <div>
                <h4 class="font-bold text-base mb-6 uppercase tracking-tighter">Sort By</h4>
                <div class="relative">
                    <select (change)="onSortChange($event)"
                        class="w-full appearance-none bg-transparent border-b-2 border-neutral-100 py-2 pr-8 focus:outline-none focus:border-black text-sm font-bold uppercase transition-colors">
                        <option value="featured">Featured</option>
                        <option value="price-asc">Price: Low-High</option>
                        <option value="price-desc">Price: High-Low</option>
                    </select>
                    <div class="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Product Grid -->
    <div class="flex-grow">
        <div class="flex items-center justify-between mb-10">
            <h1 class="text-2xl font-bold uppercase tracking-tight">
                {{ (activeCategory() | titlecase) || 'All Products' }} ({{ products().length }})
            </h1>
            <button
                class="md:hidden flex items-center gap-2 font-bold uppercase text-sm border border-neutral-200 px-4 py-2 rounded-full">
                Filter
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" x2="20" y1="21" y2="21" />
                    <line x1="4" x2="20" y1="3" y2="3" />
                    <line x1="12" x2="20" y1="12" y2="12" />
                    <line x1="4" x2="8" y1="12" y2="12" />
                    <circle cx="10" cy="12" r="2" />
                </svg>
            </button>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-10 md:gap-x-6 md:gap-y-12">
            @for (product of products(); track product.id) {
            <app-product-card [product]="product" />
            } @empty {
            <div class="col-span-full py-20 text-center">
                <p class="text-lg text-text-secondary font-medium">No results found for your selection.</p>
                <a routerLink="/shop" [queryParams]="{category: null}"
                    class="text-black font-bold border-b-2 border-black pb-1 mt-4 inline-block uppercase text-sm">Clear
                    All Filters</a>
            </div>
            }
        </div>
    </div>
</div>
