<section class="py-24 px-8 md:px-20 max-w-[1440px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
  
      <!-- Category Card 1: Balls -->
      <div class="group relative aspect-[4/5] bg-surface-container-low overflow-hidden rounded-md">
        <img
          [src]="categories[0].image"
          [alt]="categories[0].imageAlt"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
        />
        <a class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/90 via-transparent to-transparent" [routerLink]="['/shop']" [queryParams]="{ category: categories[0].category }"></a>
        <div class="absolute bottom-12 left-12">
          <a [routerLink]="['/shop']" [queryParams]="{ category: categories[0].category }" class="font-headline text-4xl font-extrabold uppercase mb-4">{{ categories[0].title }}</a><br/>
          <a [routerLink]="['/shop']" [queryParams]="{ category: categories[0].category }" class="inline-flex items-center gap-2 font-headline text-sm tracking-widest uppercase text-primary-container group-hover:gap-4 transition-all">
            {{ categories[0].cta }}
            <span class="material-symbols-outlined">trending_flat</span>
          </a>
        </div>
      </div>
  
      <!-- Category Card 2: Apparel (offset down on desktop) -->
      <div class="group relative aspect-[4/5] bg-surface-container-low overflow-hidden rounded-md">
        <img
          [src]="categories[1].image"
          [alt]="categories[1].imageAlt"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
        />
        <a class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/90 via-transparent to-transparent" [routerLink]="['/shop']" [queryParams]="{ category: categories[1].category }"></a>
        <div class="absolute bottom-12 left-12">
          <a [routerLink]="['/shop']" [queryParams]="{ category: categories[1].category }" class="font-headline text-4xl font-extrabold uppercase mb-4">{{ categories[1].title }}</a><br/>
          <a [routerLink]="['/shop']" [queryParams]="{ category: categories[1].category }" class="inline-flex items-center gap-2 font-headline text-sm tracking-widest uppercase text-primary-container group-hover:gap-4 transition-all">
            {{ categories[1].cta }}
            <span class="material-symbols-outlined">trending_flat</span>
          </a>
        </div>
      </div>
  
    </div>
  </section>
