<section class="bg-surface-container-lowest py-32 overflow-hidden">

    <!-- Header -->
    <div class="px-8 md:px-20 max-w-[1440px] mx-auto mb-16 flex justify-between items-end">
      <div>
        <span class="text-primary-container font-headline text-xs tracking-[0.3em] uppercase font-bold mb-4 block">
          Seasonal Selection
        </span>
        <h2 class="font-headline text-5xl font-black uppercase tracking-tighter">Best Sellers</h2>
      </div>
      <div class="flex gap-4">
        <button
          (click)="scroll('left')"
          [disabled]="loading"
          class="w-12 h-12 flex items-center justify-center bg-surface-container-highest rounded-sm hover:bg-surface-bright transition-colors disabled:opacity-30">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button
          (click)="scroll('right')"
          [disabled]="loading"
          class="w-12 h-12 flex items-center justify-center bg-surface-container-highest rounded-sm hover:bg-surface-bright transition-colors disabled:opacity-30">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
  
    <!-- Loading skeletons -->
     @if (loading) {
         <div class="flex gap-8 px-8 md:px-20 overflow-hidden pb-12">
            @for (i of [1,2,3,4]; track $index) {
                <div class="min-w-[320px] md:min-w-[400px] animate-pulse">
                  <div class="bg-surface-container aspect-square rounded-md mb-6"></div>
                  <div class="h-5 bg-surface-container rounded w-3/4 mb-3"></div>
                  <div class="h-4 bg-surface-container rounded w-1/2"></div>
                </div>
            }
         </div>
     }
  
    <!-- Error state -->
     @if (error && !loading) {
         <div class="px-8 md:px-20 flex items-center gap-4 text-error">
           <span class="material-symbols-outlined">error</span>
           <p class="font-headline uppercase tracking-widest text-sm">{{ error }}</p>
         </div>
     }
  
    <!-- Product cards -->
     @if (!loading && !error) {
         <div
           #scrollTrack
           class="flex gap-8 px-8 md:px-20 overflow-x-auto no-scrollbar pb-12">
       @for (product of products; track $index) {
           <div class="min-w-[320px] md:min-w-[400px] max-w-[400px]" [routerLink]="['/products', product.handle]">
             <div class="bg-surface-container-low aspect-square rounded-md overflow-hidden mb-6 group cursor-pointer w-full">
               <img
                 [src]="getImage(product)"
                 [alt]="product.title"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
               />
             </div>
             <div class="flex justify-between items-start">
               <div>
                 <h3 class="font-headline font-bold text-lg uppercase mb-1">{{ product.title }}</h3>
                 <p class="text-on-surface-variant text-sm font-body tracking-wider uppercase">
                   {{ getSubtitle(product) }}
                 </p>
               </div>
               <span class="font-headline font-bold text-primary-container whitespace-nowrap ml-4">
                 {{ getPrice(product) }}
               </span>
             </div>
           </div>
       }
         </div>
     }
  </section>
